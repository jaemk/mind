[package]
name = "mind"
version = "0.1.0"
edition = "2024"
license = "MIT"
description = "A brew-like manager for agent tooling: skills, agents, and rules from arbitrary GitHub repos."

[[bin]]
name = "mind"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
glob = "0.3"
thiserror = "2"
dirs = "5"
